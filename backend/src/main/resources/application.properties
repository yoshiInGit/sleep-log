spring.application.name=sleep-log

# ==========================================
# 共通設定 (Common Configuration)
# ==========================================

# JPA / Hibernate
# ------------------------------------------
# 方言設定 (Dialect) は環境共通
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# ローカル開発用設定 (Local Development Defaults)
# ==========================================
# Dockerや他環境で起動する場合は、環境変数または別プロファイルで上書きされます

# Database Connection
# ------------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/sleeplog
spring.datasource.username=sleeplog
spring.datasource.password=sleeplog123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA (Local)
# ------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
